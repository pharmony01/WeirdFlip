<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeirdFlip — Hypixel Bazaar</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #07090f;
      --surface:     #0c0f1a;
      --card:        #111520;
      --card-hover:  #161c2e;
      --border:      #1c2235;
      --border-soft: #141826;
      --accent:      #f0a500;
      --accent-dim:  rgba(240, 165, 0, 0.10);
      --green:       #22d3a0;
      --green-dim:   rgba(34, 211, 160, 0.12);
      --amber:       #fbbf24;
      --amber-dim:   rgba(251, 191, 36, 0.12);
      --red:         #f87171;
      --red-dim:     rgba(248, 113, 113, 0.12);
      --blue:        #60a5fa;
      --text:        #dde3f0;
      --text-muted:  #4a5568;
      --text-dim:    #7a8499;
      --font-display:'Oxanium', sans-serif;
      --font-mono:   'IBM Plex Mono', monospace;
      --font-body:   'Manrope', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(240,165,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,165,0,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; top: -300px; left: 50%; transform: translateX(-50%);
      width: 900px; height: 500px;
      background: radial-gradient(ellipse, rgba(240,165,0,0.07) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .container {
      max-width: 1800px; margin: 0 auto;
      padding: 0 28px 60px;
      position: relative; z-index: 1;
    }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0; margin-bottom: 24px;
      border-bottom: 1px solid var(--border); position: relative;
    }
    header::after {
      content: ''; position: absolute; bottom: -1px; left: 0;
      width: 200px; height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .logo { display: flex; align-items: baseline; gap: 14px; }
    .logo h1 {
      font-family: var(--font-display); font-size: 2.2rem; font-weight: 800;
      letter-spacing: 0.08em; color: var(--accent);
      animation: logo-glow 3s ease-in-out infinite alternate;
    }
    @keyframes logo-glow {
      from { text-shadow: 0 0 40px rgba(240,165,0,0.4), 0 0 12px rgba(240,165,0,0.2); }
      to   { text-shadow: 0 0 80px rgba(240,165,0,0.7), 0 0 30px rgba(240,165,0,0.4); }
    }
    .logo-sub {
      font-family: var(--font-mono); font-size: 0.65rem;
      letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 24px; }
    .live-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: 20px;
      font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.1em; color: var(--text-muted);
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green); flex-shrink: 0;
    }
    .live-dot.loading { background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: blink 0.8s ease-in-out infinite; }
    .live-dot.error   { background: var(--red);   box-shadow: 0 0 8px var(--red);   animation: none; }
    .live-dot:not(.loading):not(.error) { animation: breathe 2.5s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.35} }
    @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0.2}  }

    .refresh-btn {
      position: relative; width: 40px; height: 40px;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .refresh-btn.disabled { opacity: 0.35; pointer-events: none; }
    .refresh-btn svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 2.5; }
    .ring-progress {
      fill: none; stroke: var(--accent); stroke-width: 2.5;
      stroke-linecap: round; stroke-dasharray: 101; stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--text-dim);
      transition: color 0.2s, transform 0.3s; user-select: none;
    }
    .refresh-btn:hover .ring-icon { color: var(--accent); transform: rotate(30deg); }

    /* ── FILTERS ── */
    .filter-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr) auto auto;
      gap: 10px; align-items: stretch;
      margin-bottom: 14px;
    }
    .filter-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .filter-card:focus-within {
      border-color: rgba(240,165,0,0.4);
      box-shadow: 0 0 0 3px rgba(240,165,0,0.06);
    }
    .filter-label {
      display: block; font-family: var(--font-mono); font-size: 0.58rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 7px;
    }
    .filter-input {
      width: 100%; background: transparent; border: none; outline: none;
      font-family: var(--font-mono); font-size: 0.95rem;
      color: var(--text); caret-color: var(--accent);
    }
    .filter-input::placeholder { color: var(--text-muted); }
    .filter-input.invalid { color: var(--red); }

    .btn-reset {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 0 18px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim);
      cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .btn-reset:hover {
      border-color: rgba(240,165,0,0.4); color: var(--accent);
      background: var(--accent-dim);
    }

    .toggle-wrap {
      display: flex; flex-direction: column; justify-content: center;
      align-items: flex-start; gap: 7px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
      white-space: nowrap; user-select: none;
    }
    .toggle-wrap:hover { border-color: rgba(240,165,0,0.3); }
    .toggle-wrap.active {
      border-color: rgba(251,191,36,0.4);
      background: rgba(251,191,36,0.05);
    }
    .toggle-label-text {
      font-family: var(--font-mono); font-size: 0.58rem;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
    }
    .toggle-wrap.active .toggle-label-text { color: var(--amber); }
    .toggle-row { display: flex; align-items: center; gap: 8px; }
    .toggle-track {
      width: 36px; height: 18px; border-radius: 9px;
      background: var(--border); position: relative;
      transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-wrap.active .toggle-track { background: rgba(251,191,36,0.5); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--text-muted); transition: transform 0.2s, background 0.2s;
    }
    .toggle-wrap.active .toggle-thumb { transform: translateX(18px); background: var(--amber); }
    .toggle-state-text {
      font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);
    }
    .toggle-wrap.active .toggle-state-text { color: var(--amber); }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; padding: 0 2px;
    }
    .status-count {
      font-family: var(--font-mono); font-size: 0.73rem; color: var(--text-muted);
    }
    .status-count strong { color: var(--accent); font-weight: 600; }
    .last-updated {
      font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted);
    }

    /* ── TABLE ── */
    .table-wrapper {
      border: 1px solid var(--border); border-radius: 14px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 1500px; }
    thead { background: var(--surface); }

    th {
      padding: 13px 16px; text-align: left;
      font-family: var(--font-mono); font-size: 0.62rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted); white-space: nowrap;
      cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s, background 0.2s;
      position: relative;
    }
    th:hover { color: var(--text); background: rgba(255,255,255,0.02); }
    th.sort-active { color: var(--accent); }
    th.sort-asc::after  { content: ' ↑'; }
    th.sort-desc::after { content: ' ↓'; }
    th.no-sort { cursor: default; }

    tbody tr {
      border-bottom: 1px solid var(--border-soft);
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease, background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr.visible { opacity: 1; transform: translateY(0); }
    tbody tr:hover { background: var(--card-hover); }
    tbody tr:hover td.td-name { color: var(--accent); }

    @keyframes row-updated {
      0%   { background: rgba(240,165,0,0.12); }
      100% { background: transparent; }
    }
    tbody tr.updated { animation: row-updated 1s ease forwards; }

    td { padding: 13px 16px; font-size: 0.85rem; white-space: nowrap; }
    .td-name {
      font-family: var(--font-body); font-weight: 600; color: var(--text);
      max-width: 200px; overflow: hidden; text-overflow: ellipsis;
      transition: color 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .item-icon {
      width: 24px; height: 24px; border-radius: 4px;
      flex-shrink: 0; image-rendering: pixelated;
    }
    .td-mono { font-family: var(--font-mono); font-size: 0.8rem; }
    .td-green { color: var(--green); }
    .td-amber { color: var(--amber); }
    .td-red   { color: var(--red);   }
    .td-dim   { color: var(--text-dim); }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-family: var(--font-mono); font-size: 0.62rem;
      letter-spacing: 0.06em; font-weight: 600;
      text-transform: uppercase; white-space: nowrap;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .badge-low    { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,211,160,0.2); }
    .badge-low    .badge-dot { background: var(--green); }
    .badge-medium { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
    .badge-medium .badge-dot { background: var(--amber); }
    .badge-high   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
    .badge-high   .badge-dot { background: var(--red); }

    /* ── FLAGS (dead market + volume imbalance) ── */
    .flag-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 6px;
      font-size: 12px; cursor: help; position: relative;
      flex-shrink: 0;
    }
    .flag-dead {
      background: var(--amber-dim); border: 1px solid rgba(251,191,36,0.2);
      color: var(--amber);
    }
    .flag-imbal {
      background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2);
      color: var(--blue); margin-left: 5px;
    }

    /* Flag tooltip — JS-positioned fixed div, bypasses overflow clipping */
    #flag-tooltip {
      position: fixed;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-body); font-size: 0.75rem;
      line-height: 1.55; padding: 9px 13px; border-radius: 8px;
      max-width: 280px; pointer-events: none; white-space: normal;
      box-shadow: 0 8px 32px rgba(0,0,0,0.75);
      z-index: 500; opacity: 0; transition: opacity 0.15s;
    }
    #flag-tooltip.visible { opacity: 1; }

    /* ── SEARCH ROW ── */
    .search-row {
      margin-bottom: 10px;
    }
    .search-card {
      display: flex; align-items: center; gap: 10px;
      position: relative;
    }
    .search-icon {
      font-size: 0.85rem; color: var(--text-muted); flex-shrink: 0;
      pointer-events: none;
    }
    .search-clear {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      display: none;
    }
    .search-clear:hover { color: var(--text); background: var(--border); }
    .search-card.has-value .search-clear { display: block; }
    .search-card.has-value .filter-input { padding-right: 32px; }

    /* Vol. cell stacked display */
    .vol-cell { display: flex; flex-direction: column; gap: 2px; }
    .vol-line  { font-family: var(--font-mono); font-size: 0.78rem; }
    .vol-line-sub { font-family: var(--font-mono); font-size: 0.72rem; opacity: 0.8; }

    /* Column header tooltip (JS-positioned, 500ms delay) */
    #col-tooltip {
      position: fixed;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-dim); font-family: var(--font-body); font-size: 0.75rem;
      line-height: 1.55; padding: 9px 13px; border-radius: 8px;
      max-width: 260px; pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 200; opacity: 0; transition: opacity 0.15s;
    }
    #col-tooltip.visible { opacity: 1; }

    /* Skeleton shimmer */
    .skeleton-cell {
      height: 14px; border-radius: 4px;
      background: linear-gradient(90deg,
        var(--surface) 0%, var(--card) 40%, var(--card-hover) 50%,
        var(--card) 60%, var(--surface) 100%);
      background-size: 300% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-icon { font-size: 3rem; opacity: 0.3; margin-bottom: 16px; }
    .empty-state p {
      font-family: var(--font-mono); font-size: 0.8rem;
      color: var(--text-muted); margin-bottom: 6px;
    }

    .error-banner {
      background: var(--red-dim); border: 1px solid rgba(248,113,113,0.25);
      border-radius: 10px; padding: 14px 20px;
      font-family: var(--font-mono); font-size: 0.8rem;
      color: var(--red); margin-bottom: 16px; display: none;
    }

    @media (max-width: 1200px) {
      .filter-row { grid-template-columns: repeat(2, 1fr) auto auto; }
    }
    @media (max-width: 700px) {
      .filter-row { grid-template-columns: 1fr 1fr; }
      .btn-reset, .toggle-wrap { grid-column: span 2; }
      .logo h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <h1>WeirdFlip</h1>
      <span class="logo-sub">Hypixel Bazaar</span>
    </div>
    <div class="header-right">
      <div class="live-pill">
        <div class="live-dot" id="liveDot"></div>
        <span id="liveStatus">LIVE</span>
      </div>
      <div class="refresh-btn" id="refreshBtn" title="Click to refresh now">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle class="ring-bg" cx="20" cy="20" r="16"/>
          <circle class="ring-progress" id="ringProgress" cx="20" cy="20" r="16"/>
        </svg>
        <div class="ring-icon">↺</div>
      </div>
    </div>
  </header>

  <div class="error-banner" id="errorBanner"></div>

  <div class="search-row">
    <div class="filter-card search-card" id="searchCard">
      <span class="search-icon">🔍</span>
      <input class="filter-input" id="f-search" type="text"
             placeholder="Search items… (e.g. enchanted cobblestone)"
             autocomplete="off" spellcheck="false">
      <span class="search-clear" id="searchClear" title="Clear search">✕</span>
    </div>
  </div>

  <div class="filter-row">
    <div class="filter-card">
      <label class="filter-label" for="f-capital">💰 Capital</label>
      <input class="filter-input" id="f-capital" type="text" value="50m" placeholder="50m">
    </div>
    <div class="filter-card">
      <label class="filter-label" for="f-margin">📊 Min Margin / Item</label>
      <input class="filter-input" id="f-margin" type="text" value="1000" placeholder="1000">
    </div>
    <div class="filter-card">
      <label class="filter-label" for="f-pct">📈 Min Margin %</label>
      <input class="filter-input" id="f-pct" type="text" value="1" placeholder="1">
    </div>
    <div class="filter-card">
      <label class="filter-label" for="f-vol">🔥 Min Daily Volume</label>
      <input class="filter-input" id="f-vol" type="text" value="5k" placeholder="5k">
    </div>
    <div class="toggle-wrap" id="deadToggle">
      <span class="toggle-label-text">Hide ⚠ Dead</span>
      <div class="toggle-row">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
        <span class="toggle-state-text" id="toggleStateText">Off</span>
      </div>
    </div>
    <button class="btn-reset" id="resetBtn">↺ Reset</button>
  </div>

  <div class="status-bar">
    <div class="status-count">
      Showing <strong id="resultCount">—</strong> flips &nbsp;·&nbsp; Sorted by <span id="sortLabel">Coins/hr</span>
    </div>
    <div class="last-updated" id="lastUpdated">Fetching data…</div>
  </div>

  <div class="table-wrapper">
    <table id="flipTable">
      <thead>
        <tr>
          <th data-col="name"
              data-tip="Item name from the Hypixel Bazaar.">Item</th>
          <th data-col="buyPrice"
              data-tip="Price you'll place your buy order at — nudged 0.1 above the current top bidder so your order is first in queue.">Buy Order</th>
          <th data-col="sellPrice"
              data-tip="Price you'll list your sell order at — nudged 0.1 below the current lowest ask so your listing sells first.">Sell Order</th>
          <th data-col="netMargin"
              data-tip="Profit per item after the 1.25% Bazaar tax.">Margin / Item</th>
          <th data-col="marginPct"
              data-tip="Return on investment as a percentage. Low % on a high-capital flip may not be worth locking up your coins.">Margin %</th>
          <th data-col="totalProfit"
              data-tip="Estimated total profit if the full order fills. Capped at 71,680 items or your capital, whichever is lower.">Est. Profit</th>
          <th data-col="coinsPerHour" class="sort-active sort-desc"
              data-tip="Estimated coins earned per hour based on realistic fill time (competition-adjusted).">Coins/hr</th>
          <th data-col="capitalNeeded"
              data-tip="Coins locked up in the buy order. Always at or below your capital filter.">Capital Used</th>
          <th data-col="dailyVolume"
              data-tip="↓ Sell orders/day — how fast your buy order fills. ↑ Buy orders/day — how fast your sell order fills afterward. The lower side is your bottleneck and is used for filtering. Values shown separately so you can spot imbalances at a glance — amber means that side is 3× thinner than the other.">Daily Vol.</th>
          <th data-col="fillHrs"
              data-tip="Ideal fill time — how long your full buy order takes to fill assuming you are the only buyer. Reality will be slower.">Fill (Ideal)</th>
          <th data-col="fillHrsRealistic"
              data-tip="Realistic fill time after applying a competition penalty: Low = 1.5×, Medium = 3×, High = 6×. Rough guesstimates.">Fill (Real)</th>
          <th data-col="compLevel"
              data-tip="Total active buy orders in the order book. More orders = more people potentially jumping your queue. Low ≤15, Medium ≤40, High 41+.">Competition</th>
          <th class="no-sort"
              data-tip="Dead market warning: spread >8%, very low weekly volume, and very few orders. Very likely to not fill at these prices.">⚠</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<div id="col-tooltip"></div>
<div id="flag-tooltip"></div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const API_DIRECT  = 'https://api.hypixel.net/v2/skyblock/bazaar';
const CORS_PROXY  = 'https://corsproxy.io/?url=';
const TAX         = 0.0125;
const MAX_QTY     = 71680;
const REFRESH_SEC = 30;
const CIRC        = 2 * Math.PI * 16;
const DEFAULTS    = { capital: '50m', margin: '1000', pct: '1', vol: '5k' };

// Competition fill-time multipliers (Low / Medium / High).
// These are rough order-of-magnitude estimates, not exact science.
const COMP_MULT   = [1.5, 3.0, 6.0];

// Dead-market thresholds
const DEAD_MARGIN_PCT    = 8;      // margin % above this is suspicious
const DEAD_WEEKLY_VOL    = 10000;  // max weekly vol (using Math.max of both sides)
const DEAD_MAX_ORDERS    = 5;      // very few orders on the book

// Volume imbalance: flag if one side is this many times larger than the other
const VOL_IMBAL_RATIO = 3;

// ─── STATE ──────────────────────────────────────────────────────────────────
let rawProducts    = null;   // raw API response — invalidated only on new fetch
let cachedItems    = [];     // computeItem results at lastCapital — reused across filter changes
let lastCapital    = -1;     // sentinel; -1 forces first compute
let allItems       = [];     // filtered subset of cachedItems after margin/pct/vol/dead pass
let sortCol        = 'coinsPerHour';
let sortDir        = 'desc';
let timerCount     = REFRESH_SEC;
let timerInterval  = null;
let useCorsProxy   = false;
let isFirstLoad    = true;
let isFetching     = false;
let hideDeadMarket = false;
let searchQuery    = '';

// ─── COLUMN LABELS (shared between status bar and renderTable) ───────────────
const COL_LABELS = {
  name: 'Item', buyPrice: 'Buy Order', sellPrice: 'Sell Order',
  netMargin: 'Margin/Item', marginPct: 'Margin %', totalProfit: 'Est. Profit',
  coinsPerHour: 'Coins/hr', capitalNeeded: 'Capital Used',
  dailyVolume: 'Daily Vol.', fillHrs: 'Fill (Ideal)',
  fillHrsRealistic: 'Fill (Real)', compLevel: 'Competition',
};

// ─── PARSE SHORTHAND NUMBERS ─────────────────────────────────────────────────
// "1.5k" → 1500 | "1.89m" → 1890000 | "2b" → 2e9 | "50" → 50
function parseVal(raw) {
  if (raw == null) return 0;
  const s = String(raw).trim().toLowerCase().replace(/,/g, '');
  if (!s || s === '-') return 0;
  const last = s.slice(-1);
  const n    = parseFloat(s);
  if (isNaN(n)) return NaN;
  if (last === 'k') return n * 1_000;
  if (last === 'm') return n * 1_000_000;
  if (last === 'b') return n * 1_000_000_000;
  return n;
}

// ─── FORMAT HELPERS ──────────────────────────────────────────────────────────
const fmt = {
  coins(n) {
    if (!isFinite(n) || n === 0) return '—';
    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
    return n.toFixed(1);
  },
  pct(n)  { return isFinite(n) ? n.toFixed(2) + '%' : '—'; },
  hrs(n) {
    if (!isFinite(n) || n >= 9999) return '>99d';
    if (n < 1 / 60)    return '<1m';
    if (n < 1)         return Math.round(n * 60) + 'm';
    if (n > 24 * 30)   return '>30d';
    if (n > 24)        return (n / 24).toFixed(1) + 'd';
    return n.toFixed(1) + 'h';
  },
  name(id) {
    return id.split('_')
      .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
      .join(' ');
  },
};

// ─── GET FILTERS ─────────────────────────────────────────────────────────────
function getFilters() {
  return {
    capital:   parseVal(document.getElementById('f-capital').value) || 0,
    minMargin: parseVal(document.getElementById('f-margin').value)  || 0,
    minPct:    parseVal(document.getElementById('f-pct').value)     || 0,
    minVol:    parseVal(document.getElementById('f-vol').value)     || 0,
  };
}

// ─── COMPUTE ONE ITEM ────────────────────────────────────────────────────────
// Pure function — only depends on product data + capital.
// Called once per product per capital value; results are cached in cachedItems.
function computeItem(id, product, capital) {
  const { sell_summary, buy_summary, quick_status } = product;
  if (!sell_summary?.length || !buy_summary?.length) return null;

  // Hypixel API naming is inverted:
  //   sell_summary = BID side (buy orders)  → [0] = highest bid
  //   buy_summary  = ASK side (sell orders) → [0] = lowest ask
  const buyPrice  = sell_summary[0].pricePerUnit + 0.1;
  const sellPrice = buy_summary[0].pricePerUnit  - 0.1;

  if (sellPrice <= buyPrice || buyPrice <= 0) return null;

  const tax       = sellPrice * TAX;
  const netMargin = sellPrice - tax - buyPrice;
  if (netMargin <= 0) return null;

  const marginPct = (netMargin / buyPrice) * 100;
  const qs        = quick_status || {};

  // Volume sides:
  //   sellMovingWeek = items moved via sell orders (fills YOUR buy order)
  //   buyMovingWeek  = items moved via buy orders  (fills YOUR sell order later)
  const sellMW = qs.sellMovingWeek || 0;
  const buyMW  = qs.buyMovingWeek  || 0;

  // Conservative daily volume: use the lower side.
  // If one side is much smaller the flip will stall at that stage.
  const minWeekly   = Math.min(sellMW, buyMW);
  const maxWeekly   = Math.max(sellMW, buyMW);
  const dailyVolume = minWeekly / 7;
  const sellDailyVol = sellMW / 7;
  const buyDailyVol  = buyMW  / 7;

  // Volume imbalance: one side is >VOL_IMBAL_RATIO× the other, or one side is zero.
  const volImbalance = (minWeekly > 0 && maxWeekly / minWeekly > VOL_IMBAL_RATIO)
    || (minWeekly === 0 && maxWeekly > 0);

  const maxQty       = Math.min(MAX_QTY, Math.floor(capital / buyPrice));
  if (maxQty <= 0) return null;

  const totalProfit   = netMargin * maxQty;
  const capitalNeeded = buyPrice  * maxQty;

  // Ideal fill time: assumes you're the only buyer with full volume
  const fillHrs = dailyVolume > 0 ? maxQty / (dailyVolume / 24) : 99999;

  // Competition level from order book depth (quick_status.sellOrders = bid-side orders)
  const totalBuyOrders = qs.sellOrders || 1;
  const compLevel      = totalBuyOrders <= 15 ? 0
                       : totalBuyOrders <= 40 ? 1
                       : 2;
  const competition    = ['Low', 'Medium', 'High'][compLevel];

  // Realistic fill time: multiply by competition penalty
  // Rationale: more competing buy orders means your queue position is worse
  // and you get a smaller share of incoming sell volume.
  const fillHrsRealistic = fillHrs >= 9999 ? 99999 : fillHrs * COMP_MULT[compLevel];

  // Coins per hour (based on realistic fill — more useful for comparing flips of different scale)
  const coinsPerHour = (fillHrsRealistic > 0 && fillHrsRealistic < 9999)
    ? totalProfit / fillHrsRealistic
    : 0;

  // Dead market: wide margin + tiny total volume + very few orders = likely planted spread
  // Using maxWeekly for this check (if even the busier side is dead, the item truly has no activity)
  const isManipulated = marginPct > DEAD_MARGIN_PCT
    && maxWeekly < DEAD_WEEKLY_VOL
    && totalBuyOrders < DEAD_MAX_ORDERS;

  return {
    id, name: fmt.name(id),
    buyPrice, sellPrice, netMargin, marginPct,
    totalProfit, capitalNeeded,
    sellMovingWeek: sellMW, buyMovingWeek: buyMW,
    dailyVolume, sellDailyVol, buyDailyVol, volImbalance,
    fillHrs, fillHrsRealistic, coinsPerHour,
    competition, compLevel, totalBuyOrders,
    isManipulated,
  };
}

// ─── PRECOMPUTE ALL ITEMS FOR GIVEN CAPITAL ──────────────────────────────────
// Only re-run when capital changes or on a fresh fetch.
function computeAllItems(capital) {
  if (!rawProducts) return;
  lastCapital = capital;
  cachedItems = [];
  for (const [id, product] of Object.entries(rawProducts)) {
    const item = computeItem(id, product, capital);
    if (item) cachedItems.push(item);
  }
}

// ─── APPLY FILTERS + RENDER ──────────────────────────────────────────────────
function applyFilters(fromFetch = false) {
  if (!rawProducts) return;
  const filters = getFilters();

  // Recompute the full item set only when capital changes (or on fresh fetch).
  if (filters.capital !== lastCapital) {
    computeAllItems(filters.capital);
  }

  // Filter the cheap way — no re-parsing of the API data
  let items = cachedItems.filter(item =>
    item.netMargin   >= filters.minMargin &&
    item.marginPct   >= filters.minPct    &&
    item.dailyVolume >= filters.minVol
  );
  if (hideDeadMarket) {
    items = items.filter(i => !i.isManipulated);
  }
  allItems = items;

  setStatus('live');
  const shouldAnimate = fromFetch && isFirstLoad;
  renderTable(shouldAnimate);

  if (fromFetch) {
    isFirstLoad = false;
    const t = new Date();
    document.getElementById('lastUpdated').textContent =
      `Updated ${t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
  }

  document.getElementById('sortLabel').textContent = COL_LABELS[sortCol] || sortCol;
}

// ─── SORT ────────────────────────────────────────────────────────────────────
// Always operates on a shallow copy — never mutates allItems.
function sorted() {
  return [...allItems].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    if (av === bv) return 0;
    return (av > bv ? 1 : -1) * (sortDir === 'asc' ? 1 : -1);
  });
}

// ─── RENDER TABLE ────────────────────────────────────────────────────────────
function renderTable(animate) {
  let items = sorted();

  // Apply search filter (display-only — doesn't affect score normalization)
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(i =>
      i.name.toLowerCase().includes(q) || i.id.toLowerCase().includes(q)
    );
  }

  // Always update result count here (search may narrow below allItems.length)
  document.getElementById('resultCount').textContent = items.length;

  const tbody = document.getElementById('tableBody');

  if (!items.length) {
    const msg = searchQuery
      ? `<p>No items match "<strong style="color:var(--text)">${searchQuery}</strong>".</p>
         <p>Try a different search term or clear the search bar.</p>`
      : `<p>No flips match your current filters.</p>
         <p>Try lowering the margin %, volume, or flat margin requirements.</p>`;
    tbody.innerHTML = `<tr style="opacity:1;transform:none"><td colspan="13">
      <div class="empty-state">
        <div class="empty-icon">🪙</div>
        ${msg}
      </div></td></tr>`;
    return;
  }

  const rows = items.map((item, i) => {
    const mColor  = item.marginPct    >= 5    ? 'td-green' : item.marginPct >= 2   ? 'td-amber' : 'td-dim';
    const pColor  = item.totalProfit  >= 1e6  ? 'td-green' : item.totalProfit >= 2e5 ? 'td-amber' : 'td-dim';
    const fColor  = item.fillHrsRealistic <= 6  ? 'td-green' : item.fillHrsRealistic <= 48 ? 'td-amber' : 'td-red';
    const chColor = item.coinsPerHour >= 1.5e6 ? 'td-green'
                  : item.coinsPerHour >= 1e6   ? 'td-amber'
                  : 'td-dim';
    const bClass  = ['badge-low', 'badge-medium', 'badge-high'][item.compLevel];
    const delay   = animate ? i * 35 : 0;

    // Volume: amber on the thinner side when imbalanced
    const sellThin = item.volImbalance && item.sellDailyVol < item.buyDailyVol;
    const buyThin  = item.volImbalance && item.buyDailyVol  < item.sellDailyVol;
    const sVolC    = sellThin ? 'td-amber' : 'td-dim';
    const bVolC    = buyThin  ? 'td-amber' : 'td-dim';

    // Dead market flag
    const deadFlag = item.isManipulated
      ? `<span class="flag-icon flag-dead" data-tip="Spread >8% but only ${fmt.coins(Math.max(item.sellMovingWeek, item.buyMovingWeek))} items moved last week with <${DEAD_MAX_ORDERS} orders — likely a planted spread or completely dead market.">⚠</span>`
      : '';

    return `<tr data-id="${item.id}" style="transition-delay:${delay}ms">
      <td class="td-name" title="${item.id}">
        <img class="item-icon"
             src="https://sky.coflnet.com/static/icon/${item.id}"
             alt=""
             loading="lazy"
             onerror="this.style.display='none'">
        ${item.name}
      </td>
      <td class="td-mono td-dim">${fmt.coins(item.buyPrice)}</td>
      <td class="td-mono td-dim">${fmt.coins(item.sellPrice)}</td>
      <td class="td-mono ${mColor}">${fmt.coins(item.netMargin)}</td>
      <td class="td-mono ${mColor}">${fmt.pct(item.marginPct)}</td>
      <td class="td-mono ${pColor}">${fmt.coins(item.totalProfit)}</td>
      <td class="td-mono ${chColor}">${item.coinsPerHour > 0 ? fmt.coins(item.coinsPerHour) + '/h' : '—'}</td>
      <td class="td-mono td-dim">${fmt.coins(item.capitalNeeded)}</td>
      <td>
        <div class="vol-cell">
          <span class="vol-line ${sVolC}">↓ ${fmt.coins(item.sellDailyVol)}/d</span>
          <span class="vol-line-sub ${bVolC}">↑ ${fmt.coins(item.buyDailyVol)}/d</span>
        </div>
      </td>
      <td class="td-mono td-dim">${fmt.hrs(item.fillHrs)}</td>
      <td class="td-mono ${fColor}">${fmt.hrs(item.fillHrsRealistic)}</td>
      <td>
        <span class="badge ${bClass}">
          <span class="badge-dot"></span>${item.competition}
          <span style="opacity:0.5;font-size:0.55rem;margin-left:2px">(${item.totalBuyOrders})</span>
        </span>
      </td>
      <td>${deadFlag}</td>
    </tr>`;
  });

  tbody.innerHTML = rows.join('');

  requestAnimationFrame(() => {
    tbody.querySelectorAll('tr').forEach((row, i) => {
      setTimeout(() => row.classList.add('visible'), animate ? i * 35 : 0);
    });
  });
}

// ─── SKELETON ────────────────────────────────────────────────────────────────
function showSkeletons() {
  // 13 columns (score removed)
  const widths = [140, 70, 70, 65, 55, 85, 80, 85, 90, 55, 55, 90, 10];
  document.getElementById('tableBody').innerHTML =
    Array(10).fill(0).map(() =>
      `<tr style="opacity:1;transform:none">${
        widths.map(w => `<td><div class="skeleton-cell" style="width:${w}px"></div></td>`).join('')
      }</tr>`
    ).join('');
}

// ─── FETCH ───────────────────────────────────────────────────────────────────
// Outer function guards against concurrent calls; inner handles CORS retry.
async function fetchData() {
  if (isFetching) return;
  isFetching = true;
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('disabled');

  await _fetchInner();

  isFetching = false;
  btn.classList.remove('disabled');
}

async function _fetchInner() {
  setStatus('loading');
  if (isFirstLoad) showSkeletons();

  const url = useCorsProxy
    ? CORS_PROXY + encodeURIComponent(API_DIRECT)
    : API_DIRECT;

  let data;
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
    if (!data.success) throw new Error('API returned success: false');
    hideError();
  } catch (err) {
    if (!useCorsProxy) {
      useCorsProxy = true;
      console.info('[WeirdFlip] Direct fetch blocked — retrying via CORS proxy…');
      return _fetchInner(); // recurse; isFetching stays true (correct)
    }
    setStatus('error');
    showError(`Could not reach Hypixel API — ${err.message}. Will retry in ${REFRESH_SEC}s.`);
    document.getElementById('lastUpdated').textContent = 'Failed to fetch.';
    return;
  }

  rawProducts = data.products;
  // Force a full recompute on new fetch data by resetting lastCapital.
  // Capital may not have changed but the prices certainly have.
  lastCapital = -1;
  applyFilters(true);
}

// ─── STATUS ──────────────────────────────────────────────────────────────────
function setStatus(s) {
  const dot = document.getElementById('liveDot');
  const lbl = document.getElementById('liveStatus');
  dot.className = 'live-dot';
  if (s === 'loading') { dot.classList.add('loading'); lbl.textContent = 'UPDATING'; }
  else if (s === 'error') { dot.classList.add('error'); lbl.textContent = 'ERROR'; }
  else lbl.textContent = 'LIVE';
}
function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.textContent = msg; b.style.display = 'block';
}
function hideError() {
  document.getElementById('errorBanner').style.display = 'none';
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function startTimer() {
  timerCount = REFRESH_SEC;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerCount = Math.max(0, timerCount - 1);
    document.getElementById('ringProgress').style.strokeDashoffset =
      CIRC * (1 - timerCount / REFRESH_SEC);
    if (timerCount <= 0) { clearInterval(timerInterval); fetchData().then(startTimer); }
  }, 1000);
}

document.getElementById('refreshBtn').addEventListener('click', () => {
  clearInterval(timerInterval);
  fetchData().then(startTimer);
});

// ─── SORT HEADERS ────────────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = sortCol === col ? (sortDir === 'asc' ? 'desc' : 'asc') : 'desc';
    sortCol = col;
    document.querySelectorAll('th').forEach(h =>
      h.classList.remove('sort-active', 'sort-asc', 'sort-desc'));
    th.classList.add('sort-active', sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    document.getElementById('sortLabel').textContent = COL_LABELS[sortCol] || sortCol;
    renderTable(false);
  });
});

// ─── FILTER INPUTS ───────────────────────────────────────────────────────────
let filterDebounce;
function onFilterChange() {
  ['f-capital', 'f-margin', 'f-pct', 'f-vol'].forEach(id => {
    const el = document.getElementById(id);
    const v  = parseVal(el.value);
    el.classList.toggle('invalid', isNaN(v) || v < 0);
  });
  clearTimeout(filterDebounce);
  filterDebounce = setTimeout(() => applyFilters(false), 300);
}
['f-capital', 'f-margin', 'f-pct', 'f-vol'].forEach(id =>
  document.getElementById(id).addEventListener('input', onFilterChange));

// ─── RESET ───────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('f-capital').value = DEFAULTS.capital;
  document.getElementById('f-margin').value  = DEFAULTS.margin;
  document.getElementById('f-pct').value     = DEFAULTS.pct;
  document.getElementById('f-vol').value     = DEFAULTS.vol;
  ['f-capital', 'f-margin', 'f-pct', 'f-vol'].forEach(id =>
    document.getElementById(id).classList.remove('invalid'));
  // Also clear search
  document.getElementById('f-search').value = '';
  searchQuery = '';
  document.getElementById('searchCard').classList.remove('has-value');
  clearTimeout(filterDebounce);
  applyFilters(false);
});

// ─── DEAD MARKET TOGGLE ──────────────────────────────────────────────────────
// Calls applyFilters (not just renderTable) so score normalization also
// excludes dead items from the percentile calculation.
document.getElementById('deadToggle').addEventListener('click', () => {
  hideDeadMarket = !hideDeadMarket;
  document.getElementById('deadToggle').classList.toggle('active', hideDeadMarket);
  document.getElementById('toggleStateText').textContent = hideDeadMarket ? 'On' : 'Off';
  applyFilters(false);
});

// ─── COLUMN HEADER TOOLTIPS (500ms delay) ────────────────────────────────────
const colTooltip = document.getElementById('col-tooltip');
let tipTimer = null;

document.querySelectorAll('th[data-tip]').forEach(th => {
  th.addEventListener('mouseenter', () => {
    clearTimeout(tipTimer);
    tipTimer = setTimeout(() => {
      const r = th.getBoundingClientRect();
      colTooltip.textContent = th.dataset.tip;
      colTooltip.classList.add('visible');
      let left = r.left;
      if (left + 260 > window.innerWidth - 12) left = window.innerWidth - 272;
      colTooltip.style.left = Math.max(8, left) + 'px';
      colTooltip.style.top  = (r.bottom + 6) + 'px';
    }, 500);
  });
  th.addEventListener('mouseleave', () => {
    clearTimeout(tipTimer);
    colTooltip.classList.remove('visible');
  });
  th.addEventListener('click', () => {
    clearTimeout(tipTimer);
    colTooltip.classList.remove('visible');
  });
});

// ─── SEARCH ──────────────────────────────────────────────────────────────────
let searchDebounce;
document.getElementById('f-search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  document.getElementById('searchCard').classList.toggle('has-value', searchQuery.length > 0);
  clearTimeout(searchDebounce);
  // Shorter debounce for search — no recompute, just re-render
  searchDebounce = setTimeout(() => renderTable(false), 120);
});

document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('f-search').value = '';
  searchQuery = '';
  document.getElementById('searchCard').classList.remove('has-value');
  renderTable(false);
  document.getElementById('f-search').focus();
});

// ─── FLAG TOOLTIPS (event delegation on tbody) ────────────────────────────────
// Using a JS-positioned fixed div so table overflow clipping is irrelevant.
const flagTooltip = document.getElementById('flag-tooltip');
let flagTipTimer  = null;

document.getElementById('tableBody').addEventListener('mouseover', e => {
  const flag = e.target.closest('.flag-icon');
  if (!flag) return;
  clearTimeout(flagTipTimer);
  const tip = flag.getAttribute('data-tip');
  if (!tip) return;
  flagTipTimer = setTimeout(() => {
    flagTooltip.textContent = tip;
    flagTooltip.classList.add('visible');
    const r    = flag.getBoundingClientRect();
    const tw   = 280;
    let left   = r.right - tw;
    if (left < 8) left = 8;
    if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
    let top    = r.bottom + 6;
    // Flip upward if tooltip would go off-screen bottom
    if (top + 120 > window.innerHeight) top = r.top - 120;
    flagTooltip.style.left = left + 'px';
    flagTooltip.style.top  = top  + 'px';
  }, 200);
});

document.getElementById('tableBody').addEventListener('mouseout', e => {
  const flag = e.target.closest('.flag-icon');
  if (!flag) return;
  clearTimeout(flagTipTimer);
  flagTooltip.classList.remove('visible');
});

// ─── INIT ────────────────────────────────────────────────────────────────────
document.getElementById('ringProgress').style.strokeDasharray  = CIRC;
document.getElementById('ringProgress').style.strokeDashoffset = 0;
fetchData().then(startTimer);
</script>
